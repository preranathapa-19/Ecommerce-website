<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thapa-Mart</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <nav class="bg-[#F85606] text-white font-bold flex justify-between p-6">
      <span class="text-xl" style="font-family: &quot;Pacifico&quot;, cursive">
        Thapa Mart
      </span>

      <ul class="flex gap-10 text-xl">
        <li>Home</li>
        <li>Product</li>
        <li>About</li>
        <li>Contact</li>
      </ul>
      <!-- <i class="fa-solid fa-bars text-xl"></i> -->
      <span class="text-2xl">
        <i class="fa-solid fa-cart-shopping mr-5"></i>
        <i class="fa-regular fa-user"></i>
      </span>
    </nav>
    <main>
      <section class="w-full relative">
         <img
          class=" h-100 w-full  object-cover "
          src="https://images.pexels.com/photos/5632402/pexels-photo-5632402.jpeg"
          alt="hero-image" />
        <div class="absolute top-10 left-10" >
          <h2 class="text-4xl font-bold">
            Everything Fresh, Delivered <br />
            to Your Door
          </h2>
          <p class="text-xl ">
            Shop fresh fruits, vegetables, dairy products, beverages, snacks,
            and daily essentials—all in one place. Enjoy quality products,
            affordable prices, and fast delivery right to your doorstep.
          </p>

          <button
            class="text-white bg-[#F85606] p-3.5 rounded-full text-xl font-bold">
            Shop Now
          </button>
        </div>

      </section>
    </main>
  </body>
</html>
